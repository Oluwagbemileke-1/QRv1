<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>qr-ui</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);

        if ((path === "/verify-email" || path.startsWith("/verify-email/")) && !params.get("token")) {
          const prefix = "/verify-email/";
          if (path.startsWith(prefix)) {
            const pathToken = decodeURIComponent(path.slice(prefix.length)).replace(/\/+$/, "");
            if (pathToken) {
              params.set("token", pathToken);
              window.history.replaceState(null, "", `/verify-email?${params.toString()}`);
            }
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
